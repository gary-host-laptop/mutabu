<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>無 · new tab</title>
    <style>
        @font-face {
            font-family: 'DotGothic16';
            src: url('fonts/DotGothic16-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Medodica';
            src: url('fonts/MedodicaRegular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Orbitron';
            src: url('fonts/Orbitron-VariableFont_wght.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Oxanium';
            src: url('fonts/Oxanium-VariableFont_wght.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Share Tech Mono';
            src: url('fonts/ShareTechMono-Regular.ttf') format('truetype');
        }
        @font-face {
            font-family: 'VT323';
            src: url('fonts/VT323-Regular.ttf') format('truetype');
        }
        @font-face {
            font-family: 'Courier Prime';
            src: url('fonts/CourierPrime-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Courier Prime';
            src: url('fonts/CourierPrime-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'Courier Prime';
            src: url('fonts/CourierPrime-Italic.ttf') format('truetype');
            font-weight: 400;
            font-style: italic;
        }
        @font-face {
            font-family: 'Courier Prime';
            src: url('fonts/CourierPrime-BoldItalic.ttf') format('truetype');
            font-weight: 700;
            font-style: italic;
        }
        @font-face {
            font-family: 'BIZ UDGothic';
            src: url('fonts/BIZUDGothic-Regular.ttf') format('truetype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'BIZ UDGothic';
            src: url('fonts/BIZUDGothic-Bold.ttf') format('truetype');
            font-weight: 700;
        }
        @font-face {
            font-family: 'Noto Sans JP';
            src: url('fonts/NotoSansJP-VariableFont_wght.ttf') format('truetype');
        }
    </style>
    <style>
        /* ─── VARIABLES ─────────────────────────────────────── */
        :root {
            --bg:        #060608;
            --panel:     #12111a;
            --panel2:    #16151f;
            --border:    #302d42;
            --border-lt: #4a4660;
            --white:     #e8e8f0;
            --dim:       #8a88a0;
            --dimmer:    #4a4660;
            --accent:    #8ab4f8;
            --accent2:   #c4a0f8;
            --accent3:   #90d870;
            --red:       #f28080;
            --titlebar:  #0e0d16;

            --font-pixel: 'DotGothic16', monospace;
            --font-doto:  'Medodica', monospace;
        }

        /* ─── RESET / BASE ──────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%;
            min-height: 100%;
            background: var(--bg);
            color: var(--white);
            font-family: var(--font-pixel);
            font-size: 13px;
            overflow-x: hidden;
        }

        /* ─── BACKGROUND LAYERS ─────────────────────────────── */
        /* body bg = layer 0, theme-aware via body.light CSS vars */
        /* #bg     = layer 1: image, above body color             */
        /* #crt    = layer 2: scanlines over image                */
        /* .page   = layer 3: content                            */
        #bg {
            position: fixed;
            inset: -20px;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        #bg img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }

        #bg.blurred img {
            filter: blur(4px);
        }

        /* Layer 2: CRT scanlines */
        #crt {
            position: fixed;
            inset: 0;
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(255,255,255,0.012) 2px,
                    rgba(255,255,255,0.012) 4px
                );
            pointer-events: none;
            z-index: 2;
        }

        body.light #crt {
            background:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0,0,0,0.018) 2px,
                    rgba(0,0,0,0.018) 4px
                );
        }

        /* Layer 3: content */
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent2); }
        .page {
            position: relative;
            z-index: 3;
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 20px 40px;
            display: grid;
            grid-template-rows: auto auto 1fr;
            gap: 16px;
            min-height: 100vh;
        }

        /* ─── HEADER ROW ────────────────────────────────────── */
        .header {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: end;
            gap: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 14px;
        }

        .clock-block {}

        #clock {
            font-family: var(--font-doto);
            font-size: 90px;
            font-weight: 900;
            color: var(--white);
            letter-spacing: 4px;
            line-height: 1;
            cursor: pointer;
            user-select: none;
            height: 52px;
            display: flex;
            align-items: center;
        }

        /* Clock color mode overrides */
        #clock.force-light { color: #e8e8f0; }
        #clock.force-dark  { color: #1a1a24; }

        /* Per-font size overrides — body class set by applySettings.
           All heights are fixed; font-size here is purely visual. */

        /* Clock: fill 52px fixed container */
        body.font-medodica #clock { font-size: 105px; }
        body.font-orbitron #clock { font-size: 73px;  }
        body.font-oxanium  #clock { font-size: 71px;  }

        /* Timer display: fill 60px fixed container */
        body.font-medodica .timer-display { font-size: 55px; }
        body.font-orbitron .timer-display { font-size: 42px; }
        body.font-oxanium  .timer-display { font-size: 41px; }

        /* Timer inputs: height fixed at 28px, font-size is visual only */
        body.font-medodica .timer-input { font-size: 22px; }
        body.font-orbitron .timer-input { font-size: 15px; }
        body.font-oxanium  .timer-input { font-size: 15px; }

        body.font-medodica .timer-sep { font-size: 24px; }
        body.font-orbitron .timer-sep { font-size: 16px; }
        body.font-oxanium  .timer-sep { font-size: 16px; }

        #clock.binary {
            font-size: unset;
            letter-spacing: unset;
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 6px;
            height: 52px;
        }

        .bin-group {
            display: grid;
            grid-template-columns: repeat(4, 16px);
            grid-template-rows: repeat(2, 16px);
            gap: 8px;
        }

        .bin-bit {
            width: 16px;
            height: 16px;
            background: var(--border);
            transform: rotate(45deg);
            transition: background 0.15s;
        }

        .bin-bit.on  { background: var(--greeting-accent, var(--accent2)); box-shadow: 0 0 6px var(--greeting-accent, var(--accent2)); }
        .bin-bit.off { background: var(--border); }
        .bin-empty   { width: 16px; height: 16px; }

        .bin-sep {
            font-family: var(--font-doto);
            font-size: 20px;
            color: var(--dimmer);
            line-height: 1;
            align-self: flex-end;
            padding-bottom: 1px;
        }

        #date {
            font-family: var(--font-pixel);
            font-size: 11px;
            color: var(--dim);
            margin-top: 4px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            font-size: 11px;
            color: var(--dimmer);
            letter-spacing: 1px;
        }

        .header-right span {
            color: var(--accent2);
            font-size: 13px;
        }

        .header-btns {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        /* ─── SEARCH ────────────────────────────────────────── */
        .search-bar {
            position: relative;
        }

        .search-bar::before {
            content: '›';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-55%);
            color: var(--accent);
            font-size: 18px;
            pointer-events: none;
            z-index: 1;
        }

        .search-bar input {
            width: 100%;
            background: var(--panel);
            border: 1px solid var(--border);
            color: var(--white);
            font-family: var(--font-pixel);
            font-size: 13px;
            padding: 10px 14px 10px 30px;
            outline: none;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 8px), calc(100% - 12px) 100%, 0 100%);
            transition: border-color 0.15s, background 0.15s;
        }

        .search-bar input:focus {
            background: var(--panel2);
            border-color: var(--accent);
        }

        /* search engine tabs */
        .search-engines {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }

        .engine-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--dim);
            font-family: var(--font-pixel);
            font-size: 10px;
            padding: 3px 8px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: color 0.1s, border-color 0.1s;
        }

        .engine-btn:hover,
        .engine-btn.active {
            color: var(--accent);
            border-color: var(--accent);
        }

        .engine-btn.active {
            background: rgba(138,180,248,0.08);
        }

        /* ─── MAIN GRID ─────────────────────────────────────── */
        .grid {
            display: grid;
            grid-template-columns: 220px 1fr 200px;
            gap: 14px;
            align-items: start;
        }

        /* ─── WIDGET BASE ───────────────────────────────────── */
        .widget {
            background: var(--panel);
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 12px) 100%, 0 100%);
        }

        .widget::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 18px; height: 1px;
            background: var(--border-lt);
            z-index: 1;
        }

        /* ─── WIDGET TITLE ──────────────────────────────────── */
        .widget-title {
            display: flex;
            align-items: center;
            gap: 0;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 0;
            min-height: 32px;
            border-bottom: 1px solid var(--border);
            background: var(--titlebar);
            position: relative;
        }

        .widget-title::after {
            content: '';
            position: absolute;
            left: 20px; top: 0; bottom: 0;
            right: 72px;
            background: linear-gradient(to right, transparent 70%, var(--titlebar));
            pointer-events: none;
        }

        /* shared base for all titlebar buttons */
        .wt-btn, .wt-act {
            background: transparent;
            -webkit-appearance: none;
            appearance: none;
            border: none;
            color: var(--dimmer);
            font-size: 16px;
            cursor: pointer;
            padding: 0 9px;
            line-height: 1;
            position: relative;
            z-index: 1;
            flex-shrink: 0;
            transition: color 0.1s;
            display: flex;
            align-items: center;
        }
        .wt-btn:hover, .wt-act:hover { color: var(--white); }
        .wt-act.active { color: var(--accent2); }
        #rain-btn.playing { color: var(--red); }

        /* edit-mode-only buttons hidden by default */
        .wt-btn { visibility: hidden; }
        body.edit-mode .wt-btn { visibility: visible; }

        /* first button after label pushes right */
        .wt-label + .wt-act,
        .wt-label + .wt-btn { margin-left: auto; }

        .wt-bar {
            width: 4px;
            align-self: stretch;
            flex-shrink: 0;
            margin-right: 8px;
        }

        .wt-bar.red    { background: var(--red); box-shadow: 0 0 6px var(--red); }
        .wt-bar.blue   { background: var(--accent); box-shadow: 0 0 6px rgba(138,180,248,0.5); }
        .wt-bar.green  { background: var(--accent3); box-shadow: 0 0 6px rgba(144,216,112,0.5); }
        .wt-bar.pink   { background: var(--accent2); box-shadow: 0 0 6px rgba(196,160,248,0.5); }

        .wt-label { color: var(--dim); }
        .wt-label::after { content: ' ›'; color: var(--dimmer); }

        .widget-body { padding: 10px; }

        /* ─── FOLDERS ───────────────────────────────────────── */
        .folder-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        details.folder {
            border: 1px solid var(--border);
            background: var(--panel2);
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 6px), calc(100% - 10px) 100%, 0 100%);
        }

        details.folder[open] {
            border-color: var(--border-lt);
        }

        summary.folder-head {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 7px 10px;
            cursor: pointer;
            list-style: none;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--dim);
            user-select: none;
            border-left: 2px solid transparent;
            transition: color 0.1s, border-color 0.1s, background 0.1s;
        }

        summary.folder-head:hover {
            color: var(--white);
            border-left-color: var(--red);
            background: rgba(255,100,100,0.05);
        }

        summary.folder-head::-webkit-details-marker { display: none; }

        summary.folder-head::before {
            content: '▸';
            color: var(--dimmer);
            font-size: 10px;
            transition: transform 0.15s;
            flex-shrink: 0;
        }

        details[open] > summary.folder-head::before {
            content: '▾';
        }

        .folder-icon {
            font-size: 11px;
            opacity: 0.6;
        }

        .folder-links {
            padding: 4px 0 8px 24px;
            display: flex;
            flex-direction: column;
            gap: 1px;
            border-top: 1px solid var(--border);
        }

        .folder-links a {
            display: block;
            padding: 4px 8px;
            font-size: 12px;
            color: var(--dim);
            transition: color 0.1s;
            position: relative;
        }

        .folder-links {
            padding: 8px;
            border-top: 1px solid var(--border);
        }

        .folder-links.grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 4px;
        }

        a.fav-tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 10px 6px 8px;
            color: var(--dim);
            font-size: 10px;
            letter-spacing: 0.5px;
            text-align: center;
            background: var(--panel2);
            border: 1px solid transparent;
            transition: color 0.1s, border-color 0.1s, background 0.1s;
            text-decoration: none;
        }

        a.fav-tile:hover {
            color: var(--red);
            background: rgba(255,100,100,0.04);
            border-left: 1px solid var(--red);
        }

        a.fav-tile img.fav {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
        }

        .fav-letter {
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--panel);
            border: 1px solid var(--border-lt);
            color: var(--dim);
            font-family: var(--font-pixel);
            font-size: 14px;
            font-weight: 400;
            text-transform: uppercase;
            user-select: none;
        }

        a.fav-tile span {
            white-space: normal;
            word-break: break-word;
            max-width: 100%;
            line-height: 1.3;
        }

        .folder-links a:hover {
            color: var(--white);
        }

        .folder-links a:hover::before {
            color: var(--red);
        }

        /* ─── QUICK LINKS (flat) ────────────────────────────── */
        .quick-links {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .quick-links a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            color: var(--dim);
            border-left: 2px solid transparent;
            font-size: 12px;
            transition: color 0.1s, border-color 0.1s, background 0.1s;
        }

        .quick-links a:hover {
            color: var(--white);
            border-left-color: var(--accent);
            background: rgba(138,180,248,0.05);
        }

        .quick-links a .ql-icon { display: none; }
        .quick-links a img.ql-fav { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.85; }

        /* ─── NOTES ─────────────────────────────────────────── */
        #notes {
            width: 100%;
            min-height: 120px;
            background: transparent;
            border: none;
            color: var(--dim);
            font-family: var(--font-pixel);
            font-size: 12px;
            resize: vertical;
            outline: none;
            line-height: 1.7;
        }

        #notes::placeholder { color: var(--dimmer); }

        /* ─── WEATHER / STATUS BLOCK ────────────────────────── */
        .status-rows {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            padding: 4px 0;
            border-bottom: 1px solid var(--border);
        }

        .status-row:last-child { border-bottom: none; }
        .status-row .label { color: var(--dimmer); letter-spacing: 1px; text-transform: uppercase; }
        .status-row .value { color: var(--white); }

        /* ─── RECENTLY VISITED ──────────────────────────────── */
        .recent-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .recent-tile {
            background: var(--panel2);
            border: 1px solid var(--border);
            padding: 8px;
            font-size: 11px;
            color: var(--dim);
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 6px), calc(100% - 8px) 100%, 0 100%);
            transition: border-color 0.1s, color 0.1s;
            cursor: pointer;
        }

        .recent-tile:hover {
            border-color: var(--accent2);
            color: var(--white);
        }

        .recent-tile:hover .rt-name {
            color: var(--accent2);
        }

        .recent-tile .rt-name {
            color: var(--white);
            font-size: 12px;
            margin-bottom: 2px;
        }

        .recent-tile .rt-url {
            color: var(--dimmer);
            font-size: 10px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ─── QUOTE ─────────────────────────────────────────── */
        .quote-block {
            padding: 10px;
            border-left: 2px solid var(--dimmer);
            margin: 0;
        }

        .quote-block p {
            font-size: 11px;
            color: var(--dim);
            line-height: 1.8;
            font-style: italic;
        }

        .quote-block footer {
            margin-top: 6px;
            font-size: 10px;
            color: var(--dimmer);
            letter-spacing: 1px;
        }

        .quote-block footer::before { content: '— '; }

        /* ─── CENTER COL ────────────────────────────────────── */
        .center-col {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        /* ─── DIVIDER ───────────────────────────────────────── */
        .divider {
            height: 1px;
            background: linear-gradient(to right, var(--border-lt), transparent);
        }

        /* ─── ACCENT STRIP ──────────────────────────────────── */
        .accent-strip {
            display: flex;
            height: 2px;
            margin-bottom: -1px;
        }

        .accent-strip span:nth-child(1) { flex: 1; background: var(--red); }
        .accent-strip span:nth-child(2) { flex: 3; background: var(--accent); }
        .accent-strip span:nth-child(3) { flex: 2; background: var(--dimmer); }

        /* ─── LIGHT THEME ───────────────────────────────────── */
        body.light {
            --bg:        #e8e8e8;
            --panel:     #f2f2f2;
            --panel2:    #eaeaea;
            --border:    #c8c8cc;
            --border-lt: #b0b0b8;
            --white:     #1a1a24;
            --dim:       #5a5a6a;
            --dimmer:    #a0a0b0;
            --accent:    #3a6fd8;
            --accent2:   #7040c8;
            --accent3:   #3a9a3a;
            --red:       #c83030;
            --titlebar:  #dcdce0;
        }


        /* ─── THEME TOGGLE ───────────────────────────────────── */
        #theme-toggle, #edit-toggle, #settings-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--dimmer);
            font-size: 16px;
            line-height: 1;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
            margin: 0;
            appearance: none;
            -webkit-appearance: none;
            transition: color 0.1s, border-color 0.1s, background 0.1s;
        }

        #theme-toggle:hover { color: var(--accent); border-color: var(--accent); }

        /* ─── EDIT TOGGLE BUTTON ───────────────────────────────── */
        #edit-toggle:hover { color: var(--accent2); border-color: var(--accent2); }
        body.edit-mode #edit-toggle {
            color: var(--accent2);
            border-color: var(--accent2);
            background: rgba(196,160,248,0.08);
        }
        #settings-btn:hover { color: var(--dim); border-color: var(--dim); }

        body.light #theme-toggle,
        body.light #edit-toggle,
        body.light #settings-btn {
            color: var(--dim);
            border-color: var(--border-lt);
            background: none;
        }
        body.light #theme-toggle:hover { color: var(--accent); border-color: var(--accent); }
        body.light #edit-toggle:hover { color: var(--accent2); border-color: var(--accent2); }
        body.light #settings-btn:hover { color: var(--dim); border-color: var(--dim); }
        body.light.edit-mode #edit-toggle {
            color: var(--accent2);
            border-color: var(--accent2);
            background: rgba(196,160,248,0.08);
        }

        body.light .wt-act,
        body.light .wt-btn,
        body.light .folder-head-btn,
        body.light .qa-edit,
        body.light .tile-edit {
            color: var(--dim);
        }
        body.light .wt-act:hover,
        body.light .wt-btn:hover,
        body.light .folder-head-btn:hover,
        body.light .qa-edit:hover,
        body.light .tile-edit:hover {
            color: var(--white);
        }

        /* ─── EDIT MODE CONTROLS ────────────────────────────────── */

        /* ─── DRAG AND DROP ──────────────────────────────────────── */
        .dragging { opacity: 0.3; }
        body.edit-mode .quick-links a { cursor: grab; }
        body.edit-mode .quick-links a:active { cursor: grabbing; }
        body.edit-mode .quick-links a.drag-over {
            border-left-color: var(--accent) !important;
            background: rgba(138,180,248,0.08);
        }
        body.edit-mode details.folder { cursor: grab; }
        body.edit-mode details.folder:active { cursor: grabbing; }
        body.edit-mode details.folder.drag-over {
            border-left: 2px solid var(--red);
            background: rgba(242,128,128,0.04);
        }
        body.edit-mode .fav-tile { cursor: grab; }
        body.edit-mode .fav-tile:active { cursor: grabbing; }
        body.edit-mode .fav-tile.drag-over {
            border-color: var(--red);
            background: rgba(242,128,128,0.04);
        }


        /* ✎ on bookmark tiles — single button, top-right corner */
        .tile-edit {
            display: none;
            position: absolute;
            top: 0; right: 0;
            width: 22px; height: 22px;
            font-size: 13px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            padding: 0;
            z-index: 10;
            background: transparent;
            color: var(--dimmer);
            transition: color 0.1s;
        }
        .tile-edit:hover { color: var(--red); }
        #bm-add-folder-btn:hover { color: var(--red); }
        body.edit-mode .tile-edit { display: flex; }
        a.fav-tile { position: relative; }

        /* ✎ + in folder summary bar — hidden until edit mode */
        .folder-head-btns {
            display: none;
            margin-left: auto;
            align-items: center;
            gap: 0;
            flex-shrink: 0;
        }
        body.edit-mode .folder-head-btns { display: flex; }

        .folder-head-btn {
            background: none;
            border: none;
            color: var(--dimmer);
            font-size: 15px;
            cursor: pointer;
            padding: 0 7px;
            line-height: 1;
            display: flex;
            align-items: center;
            transition: color 0.1s;
        }
        .folder-head-btn:hover { color: var(--red); }

        /* ✎ on quick access rows — shown in edit mode */
        .qa-edit {
            display: none;
            background: none;
            border: none;
            font-size: 14px;
            line-height: 1;
            cursor: pointer;
            padding: 0 4px;
            flex-shrink: 0;
            color: var(--dimmer);
            transition: color 0.1s;
            align-items: center;
        }
        .qa-edit:hover { color: var(--accent); }
        body.edit-mode .qa-edit { display: flex; }
        body.edit-mode .qa-btn-group { display: flex !important; }

        /* × on recently visited tiles */
        .recent-x {
            display: block;
            position: absolute;
            top: 3px; right: 3px;
            background: transparent;
            color: var(--dimmer);
            font-size: 12px;
            border: none;
            padding: 2px 4px;
            cursor: pointer;
            line-height: 1;
            transition: color 0.1s;
        }
        .recent-x:hover { color: var(--accent2); }
        .recent-tile { position: relative; }

        /* + add tile in recently visited */
        .recent-add-tile {
            display: none;
            cursor: pointer;
            color: var(--dimmer);
            font-size: 10px;
            letter-spacing: 1px;
            border: 1px dashed var(--border-lt) !important;
            background: none !important;
            align-items: center;
            justify-content: center;
        }
        body.edit-mode .recent-add-tile { display: flex; }

        /* ─── KANJI WIDGET ──────────────────────────────────── */
        .kanji-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 14px 10px 10px;
            text-align: center;
        }

        .kanji-char {
            font-family: var(--font-pixel);
            font-size: 64px;
            line-height: 1;
            color: var(--white);
            letter-spacing: -2px;
            transition: color 0.15s;
            cursor: default;
        }

        .kanji-char:hover { color: var(--accent2); }

        .kanji-reading {
            font-family: var(--font-pixel);
            font-size: 17px;
            font-weight: bold;
            color: var(--accent2);
            letter-spacing: 3px;
        }

        .kanji-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .kanji-level {
            font-family: var(--font-pixel);
            font-size: 10px;
            letter-spacing: 2px;
            padding: 2px 7px;
            border: 1px solid var(--border-lt);
            color: var(--dimmer);
        }

        .kanji-level.n5 { border-color: var(--accent3); color: var(--accent3); }
        .kanji-level.n4 { border-color: var(--accent);  color: var(--accent);  }
        .kanji-level.n3 { border-color: var(--accent2); color: var(--accent2); }
        .kanji-level.n2 { border-color: #d8b440;        color: #d8b440;        }
        .kanji-level.n1 { border-color: var(--red);     color: var(--red);     }

        .kanji-meaning {
            font-family: var(--font-pixel);
            font-size: 14px;
            font-weight: bold;
            color: var(--dim);
            letter-spacing: 1px;
            line-height: 1.6;
        }

        .kanji-divider {
            width: 40px;
            height: 1px;
            background: var(--border-lt);
        }

        /* ─── PROFILE WIDGET ────────────────────────────────── */
        .profile-widget {
            position: relative;
            overflow: hidden;
        }

        .profile-inner {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            padding: 14px 12px;
        }

        .profile-img-wrap {
            position: relative;
            flex-shrink: 0;
        }

        .profile-img-wrap img {
            display: none;
            width: 100px;
            height: 100px;
            object-fit: cover;
        }

        .profile-img-wrap img.active {
            display: block;
        }

        .profile-img-wrap::after {
            display: none;
        }

        .profile-deco {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 0 10px;
            align-self: stretch;
            justify-content: center;
        }

        .profile-deco-line {
            width: 1px;
            flex: 1;
            background: linear-gradient(to bottom, transparent, var(--border-lt), transparent);
        }

        .profile-deco-dot {
            width: 4px;
            height: 4px;
            background: var(--red);
            transform: rotate(45deg);
            flex-shrink: 0;
        }

        .profile-deco-dot.dim {
            width: 3px;
            height: 3px;
            background: var(--dimmer);
        }

        .profile-tagline {
            writing-mode: vertical-rl;
            font-family: var(--font-pixel);
            font-size: 17px;
            color: var(--white);
            letter-spacing: 5px;
            line-height: 1;
        }

        /* ─── TIMER ─────────────────────────────────────────── */
        .timer-display {
            font-family: var(--font-doto);
            font-size: 42px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 4px;
            color: var(--white);
            line-height: 1;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        .timer-display.urgent { color: var(--accent2); }

        .timer-inputs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 6px 10px;
        }

        .timer-input {
            width: 48px;
            height: 28px;
            box-sizing: border-box;
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--white);
            font-family: var(--font-doto);
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            padding: 0 2px;
            outline: none;
            letter-spacing: 2px;
            -moz-appearance: textfield;
        }

        .timer-input::-webkit-outer-spin-button,
        .timer-input::-webkit-inner-spin-button { -webkit-appearance: none; }

        .timer-input:focus { border-color: var(--accent); }

        .timer-sep {
            font-family: var(--font-doto);
            font-size: 20px;
            color: var(--dimmer);
            line-height: 1;
        }

        .timer-label {
            font-family: var(--font-pixel);
            font-size: 9px;
            color: var(--dimmer);
            letter-spacing: 1px;
            text-align: center;
        }

        /* dialog buttons */
        .timer-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--dim);
            font-family: var(--font-pixel);
            font-size: 10px;
            padding: 4px 12px;
            cursor: pointer;
            letter-spacing: 1px;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 5px), calc(100% - 7px) 100%, 0 100%);
            transition: color 0.1s, border-color 0.1s, background 0.1s;
        }
        .timer-btn:hover { color: var(--accent); border-color: var(--accent); }

        /* ─── RAIN PLAYER ───────────────────────────────────── */
        .rain-player {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .rain-track {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rain-divider {
            height: 1px;
            background: var(--border);
            margin: 2px 0;
        }

        .rain-slider-master {
            accent-color: var(--accent2);
        }

        .rain-master .rain-track-label {
            color: var(--dim);
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .rain-track-label {
            font-family: var(--font-pixel);
            font-size: 16px;
            font-weight: bold;
            color: var(--dimmer);
            letter-spacing: 1px;
            width: 24px;
            flex-shrink: 0;
            text-align: center;
        }

        .rain-slider {
            -webkit-appearance: none;
            appearance: none;
            flex: 1;
            min-width: 0;
            height: 2px;
            background: var(--border);
            outline: none;
            cursor: pointer;
        }

        .rain-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 8px;
            height: 8px;
            background: var(--dimmer);
            transform: rotate(45deg);
            cursor: pointer;
            transition: background 0.1s;
        }

        .rain-slider:hover::-webkit-slider-thumb,
        .rain-slider:active::-webkit-slider-thumb {
            background: var(--accent);
        }

        .rain-slider::-moz-range-thumb {
            width: 8px;
            height: 8px;
            background: var(--dimmer);
            border: none;
            border-radius: 0;
            transform: rotate(45deg);
            cursor: pointer;
            transition: background 0.1s;
        }

        .rain-slider:hover::-moz-range-thumb,
        .rain-slider:active::-moz-range-thumb {
            background: var(--accent);
        }

        /* ─── RECENT QUICK-ADD ──────────────────────────────── */
        .recent-quick-add {
            display: flex;
            gap: 4px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        .recent-quick-add input {
            flex: 1;
            background: var(--panel2);
            border: 1px solid var(--border);
            color: var(--white);
            font-family: var(--font-pixel);
            font-size: 11px;
            padding: 5px 8px;
            outline: none;
            min-width: 0;
            transition: border-color 0.1s;
        }

        .recent-quick-add input:focus { border-color: var(--accent2); }
        .recent-quick-add input::placeholder { color: var(--dimmer); }

        .recent-quick-add button {
            background: none;
            border: 1px solid var(--border);
            color: var(--dimmer);
            font-family: var(--font-pixel);
            font-size: 14px;
            padding: 4px 10px;
            cursor: pointer;
            line-height: 1;
            transition: color 0.1s, border-color 0.1s;
            flex-shrink: 0;
        }

        .recent-quick-add button:hover { color: var(--accent2); border-color: var(--accent2); }

        /* ─── CONTEXT MENU ───────────────────────────────────── */
        #ctx-menu {
            position: fixed;
            z-index: 9999;
            background: var(--panel);
            border: 1px solid var(--border-lt);
            min-width: 140px;
            display: none;
            flex-direction: column;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 7px), calc(100% - 10px) 100%, 0 100%);
        }

        #ctx-menu.visible { display: flex; }

        .ctx-item {
            font-family: var(--font-pixel);
            font-size: 11px;
            color: var(--dim);
            padding: 8px 14px;
            cursor: pointer;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        .ctx-item:last-child { border-bottom: none; }
        .ctx-item:hover { color: var(--white); background: rgba(255,255,255,0.04); }
        .ctx-item.danger:hover { color: var(--accent2); }

        /* ─── SCROLLBAR ─────────────────────────────────────── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-lt); }
        ::-webkit-scrollbar-thumb:hover { background: var(--dim); }

        /* ─── SELECTION ─────────────────────────────────────── */
        ::selection { background: rgba(138,180,248,0.25); color: var(--white); }
    </style>
    <link rel="stylesheet" href="phosphor-light.css">
</head>
<body class="font-medodica">
<div id="bg"></div>
<div id="crt"></div>
<div id="ctx-menu"></div>
<div class="page">

    <!-- ── HEADER ─────────────────────────────────────────── -->
    <header class="header">
        <div class="clock-block">
            <div id="clock">00:00:00</div>
            <div id="date">loading...</div>
        </div>
        <div class="header-right">
            <span id="greeting">こんにちは</span>
            <span id="username"></span>
            <div class="header-btns">
                <button id="theme-toggle" title="toggle theme"><i class="ph-light ph-circle-half"></i></button>
                <button id="edit-toggle" title="edit mode"><i class="ph-light ph-pencil-simple"></i></button>
                <button id="settings-btn" title="settings"><i class="ph-light ph-gear-six"></i></button>
            </div>
        </div>
    </header>

    <!-- ── SEARCH ─────────────────────────────────────────── -->
    <div>
        <div class="accent-strip"><span></span><span></span><span></span></div>
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="search..." autocomplete="off" />
        </div>
        <div class="search-engines">
            <button class="engine-btn active" data-url="https://duckduckgo.com/?q=" data-name="ddg">duckduckgo</button>
            <button class="engine-btn" data-url="https://www.youtube.com/results?search_query=" data-name="youtube">youtube</button>
            <button class="engine-btn" data-url="https://github.com/search?q=" data-name="github">github</button>
        </div>
    </div>

    <!-- ── MAIN GRID ───────────────────────────────────────── -->
    <div class="grid">

        <!-- LEFT COL -->
        <div id="col-left" style="display:flex;flex-direction:column;gap:14px;">


            <!-- QUICK ACCESS -->
            <div class="widget" data-widget="quick-access">
                <div class="widget-title">
                    <div class="wt-bar blue"></div>
                    <span class="wt-label" data-widget-label="quick-access">クイックアクセス</span>
                    <button class="wt-btn" id="qa-add-btn"><i class="ph-light ph-plus"></i></button>
                </div>
                <div class="widget-body" style="padding:6px 10px;">
                    <div class="quick-links">
                        <!-- populated by JS from storage -->
                    </div>
                </div>
            </div>

            <!-- TIMER -->
            <div class="widget" data-widget="timer">
                <div class="widget-title">
                    <div class="wt-bar green"></div>
                    <span class="wt-label" data-widget-label="timer">タイマー</span>
                    <button class="wt-act" id="timer-reset"><i class="ph-light ph-arrow-counter-clockwise"></i></button>
                    <button class="wt-act" id="timer-start"><i class="ph-light ph-play"></i></button>
                </div>
                <div class="timer-display" id="timer-display">00:00</div>
                <div class="timer-inputs">
                    <div>
                        <input type="number" class="timer-input" id="timer-min" value="0" min="0" max="99" placeholder="00">
                        <div class="timer-label">min</div>
                    </div>
                    <span class="timer-sep">:</span>
                    <div>
                        <input type="number" class="timer-input" id="timer-sec" value="0" min="0" max="59" placeholder="00">
                        <div class="timer-label">sec</div>
                    </div>
                </div>
            </div>

            <!-- RAIN PLAYER -->
            <div class="widget" data-widget="rain">
                <div class="widget-title">
                    <div class="wt-bar blue"></div>
                    <span class="wt-label" data-widget-label="rain">雨音</span>
                    <button class="wt-act" id="rain-btn"><i class="ph-light ph-play"></i></button>
                </div>
                <div class="rain-player">
                    <div class="rain-track rain-master">
                        <span class="rain-track-label">vol</span>
                        <input type="range" class="rain-slider rain-slider-master" id="vol-master" min="0" max="1" step="0.01" value="1">
                    </div>
                    <div class="rain-divider"></div>
                    <div class="rain-track">
                        <span class="rain-track-label">雨</span>
                        <input type="range" class="rain-slider" id="vol-rain" min="0" max="1" step="0.01" value="0.7">
                    </div>
                    <div class="rain-track">
                        <span class="rain-track-label">風</span>
                        <input type="range" class="rain-slider" id="vol-wind" min="0" max="1" step="0.01" value="0.4">
                    </div>
                    <div class="rain-track">
                        <span class="rain-track-label">雷</span>
                        <input type="range" class="rain-slider" id="vol-thunder" min="0" max="1" step="0.01" value="0.5">
                    </div>
                </div>
            </div>

            <!-- QUOTE -->
            <div class="widget" data-widget="quote">
                <div class="widget-title">
                    <div class="wt-bar blue"></div>
                    <span class="wt-label" data-widget-label="quote">名言</span>
                    <button class="wt-act" id="quote-next"><i class="ph-light ph-caret-right"></i></button>
                </div>
                <div class="widget-body" style="padding:8px;">
                    <blockquote class="quote-block" id="quote-block">
                        <p id="quote-text">loading...</p>
                        <footer id="quote-author"></footer>
                    </blockquote>
                </div>
            </div>

        </div>

        <!-- CENTER COL -->
        <div id="col-center" class="center-col">

            <!-- BOOKMARKS -->
            <div class="widget" data-widget="bookmarks">
                <div class="widget-title">
                    <div class="wt-bar red"></div>
                    <span class="wt-label" data-widget-label="bookmarks">ブックマーク</span>
                    <button class="wt-btn" id="bm-add-folder-btn"><i class="ph-light ph-plus"></i></button>
                </div>
                <div class="widget-body">
                    <div class="folder-list" id="folder-list">
                        <!-- populated by JS -->
                    </div>
                </div>
            </div>
            <!-- NOTES -->
            <div class="widget" data-widget="notes">
                <div class="widget-title">
                    <div class="wt-bar green"></div>
                    <span class="wt-label" data-widget-label="notes">メモ帳</span>
                    <button class="wt-act" id="notes-clear"><i class="ph-light ph-trash"></i></button>
                </div>
                <div class="widget-body">
                    <textarea id="notes" placeholder="// type here. auto-saves."></textarea>
                </div>
            </div>

            <!-- RECENTLY VISITED (manual, editable via JS) -->
            <div class="widget" data-widget="recently-visited">
                <div class="widget-title">
                    <div class="wt-bar pink"></div>
                    <span class="wt-label" data-widget-label="recently-visited">後で見る</span>
                </div>
                <div class="widget-body">
                    <div class="recent-grid" id="recent-grid">
                        <!-- populated by JS from storage -->
                    </div>
                    <div class="recent-quick-add">
                        <input type="text" id="rqa-name" placeholder="label" autocomplete="off">
                        <input type="text" id="rqa-url"  placeholder="https://..." autocomplete="off">
                        <button id="rqa-btn">+</button>
                    </div>
                </div>
            </div>

        </div>

        <!-- RIGHT COL -->
        <div id="col-right" style="display:flex;flex-direction:column;gap:14px;">

            <!-- PROFILE -->
            <div class="widget profile-widget" data-widget="profile">
                <div class="widget-title">
                    <div class="wt-bar red"></div>
                    <span class="wt-label" data-widget-label="profile">プロフィール</span>
                </div>
                <div class="profile-inner">
                    <div class="profile-img-wrap" id="profile-img-wrap">
                        <!-- profile images injected by JS from storage -->
                    </div>
                    <div class="profile-deco">
                        <div class="profile-deco-line"></div>
                        <div class="profile-deco-dot dim"></div>
                        <div class="profile-deco-dot"></div>
                        <div class="profile-deco-dot dim"></div>
                        <div class="profile-deco-line"></div>
                    </div>
                    <div class="profile-tagline" id="profile-tagline"></div>
                </div>
            </div>

            <!-- STATUS -->
            <div class="widget" data-widget="status">
                <div class="widget-title">
                    <div class="wt-bar red"></div>
                    <span class="wt-label" data-widget-label="status">状態</span>
                </div>
                <div class="widget-body">
                    <div class="status-rows">
                        <div class="status-row">
                            <span class="label">day</span>
                            <span class="value" id="day-name">—</span>
                        </div>
                        <div class="status-row">
                            <span class="label">week</span>
                            <span class="value" id="week-num">—</span>
                        </div>
                        <div class="status-row">
                            <span class="label">year</span>
                            <span class="value" id="year-progress">—</span>
                        </div>
                        <div class="status-row">
                            <span class="label">temp</span>
                            <span class="value" id="temperature">—</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- KANJI OF THE DAY -->
            <div class="widget" data-widget="kotoba">
                <div class="widget-title">
                    <div class="wt-bar pink"></div>
                    <span class="wt-label" data-widget-label="kotoba">言葉</span>
                    <button class="wt-act" id="kanji-next"><i class="ph-light ph-caret-right"></i></button>
                </div>
                <div class="kanji-block">
                    <div class="kanji-char" id="kanji-char">語</div>
                    <div class="kanji-reading" id="kanji-reading">ご</div>
                    <div class="kanji-divider"></div>
                    <div class="kanji-meta">
                        <span class="kanji-level" id="kanji-level">N5</span>
                    </div>
                    <div class="kanji-meaning" id="kanji-meaning">word, language</div>
                </div>
            </div>



        </div><!-- /right col -->
